  #   working_dir: /app
  #   volumes:
  #     - ./client:/app
  #     - /app/node_modules
  #   ports:
  #     - "3000:3000"
  #   command: sh -c "npm install && npm run dev -- --host"
  #
  # server-dev:
  #   image: node:20-alpine
  #   working_dir: /app
  #   volumes:
  #     - ./server:/app
  #     - /app/node_modules
  #   ports:
  #     - "5000:5000"
  #   command: sh -c "npm install && npm run dev"
  #   env_file: .env
